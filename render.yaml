services:
  - type: web
    name: taypa-telegram-post-bot
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && python deploy_check.py
    startCommand: python bot.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: CONTACT_USERNAME
        sync: false
      - key: TIMEZONE
        value: Asia/Ashgabat
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-lite-image
      - key: GEMINI_IMAGE_SIZE
        value: 1K
      - key: MOCKUP_VARIANTS
        value: 1
      - key: PINTEREST_SEARCH_ENABLED
        value: true
      - key: PINTEREST_ACCESS_TOKEN
        sync: false
      - key: PINTEREST_COUNTRY_CODE
        value: US
      - key: PINTEREST_SEARCH_INTERVAL_SECONDS
        value: 21600
      - key: PINTEREST_TARGET_POOL_SIZE
        value: 160
      - key: PINTEREST_QUERIES_PER_CYCLE
        value: 2
      - key: REFERENCE_IMPORT_DELAY_SECONDS
        value: 5
      - key: REFERENCE_IDLE_INTERVAL_SECONDS
        value: 300
      - key: REFERENCE_MAX_ATTEMPTS
        value: 5
      - key: REFERENCE_MIN_POOL_SIZE
        value: 20
      - key: REFERENCE_ANALYSIS_TIMEOUT_SECONDS
        value: 90
      - key: MOCKUP_ANALYSIS_TIMEOUT_SECONDS
        value: 150
      - key: BUTTON_TEXT
        value: Написать
      - key: COPY_LANGUAGE
        value: ru
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_PATH
        value: data/posts.sqlite3
      - key: CAPTION_TEMPLATE_PATH
        value: data/caption_template.txt
