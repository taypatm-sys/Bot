services:
  - type: web
    name: taypa-telegram-post-bot
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt && python deploy_check.py
    startCommand: python bot.py
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_TELEGRAM_ID
        sync: false
      - key: CHANNEL_ID
        sync: false
      - key: CONTACT_USERNAME
        sync: false
      - key: TIMEZONE
        value: Asia/Ashgabat
      - key: GEMINI_MODEL
        value: gemini-3.1-flash-lite
      - key: GEMINI_IMAGE_MODEL
        value: gemini-3.1-flash-image
      - key: GEMINI_IMAGE_SIZE
        value: 1K
      - key: MOCKUP_VARIANTS
        value: 1
      - key: BUTTON_TEXT
        value: Написать
      - key: COPY_LANGUAGE
        value: ru
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_PATH
        value: data/posts.sqlite3
      - key: CAPTION_TEMPLATE_PATH
        value: data/caption_template.txt
